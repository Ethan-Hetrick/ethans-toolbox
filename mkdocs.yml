site_name: Ethan's Toolbox
site_description: Practical bioinformatics, HPC, and workflow job aids
site_url: https://ethan-hetrick.github.io/ethans-toolbox/
repo_url: https://github.com/Ethan-Hetrick/ethans-toolbox
repo_name: Ethan-Hetrick/ethans-toolbox
theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - One-liners:
      - Shell Helpers and Snippets: one-liners/index.md
  - HPC:
      - qacct2csv: hpc/qacct2csv.md
      - tmux Cheatsheet: hpc/tmux-cheatsheet.md
  - General:
      - File Conversion: general/file-conversion.md
      - Git Workflows: general/git-workflows.md
      - Pre-commit and Whitespace: general/fix-whitespaces.md
      - NCBI Datasets: general/ncbi-datasets.md
      - SAM Utilities: general/sam-utilities.md
      - SAM markdup Notes: general/sam-markdups.md
  - Nextflow:
      - Best Practices: nextflow/best-practices.md
      - Contributing to nf-core: nextflow/contribute-to-nfcore.md
  - Containers:
      - Run RStudio on HPC: containers/run-rstudio-on-hpc.md
      - Singularity from Conda: containers/singularity-from-conda.md
